<!doctype html>
<html lang="en">
	<head>
    	<meta charset="UTF-8" />
    	<link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/src/style.css">
    	<title>Nadir Satellite Tracker</title>
  	</head>
  	<body>
		<div id = "LoadingOverlay">
			<div id = "LoadingCard">
				<div class = "Spinner"></div>
				<h2>Retreiving Satellite Data</h2>
				<p>This may take a few seconds...</p>
			</div>
		</div>
		
		<div id="AppContainer">
			<button id="ToggleLeftSidebar" class="ToggleBtn" onclick="ToggleSidebar('LeftSidebar')">
				<img src="/src/assets/Menu.png">
			</button>

			<div class="Sidebar" id="LeftSidebar">
				<input type="text" id="NameSearch" placeholder="Satellite Name">
				<hr>
				<p class="FilterHeader">Launch Date Between:</p>
				<div id="DateContainer">
					<input type="date" id="LaunchDateFrom" class="FilterLaunchDate">
					<input type="date" id="LaunchDateTo" class="FilterLaunchDate">
				</div>
				<hr>
				<div class="FilterRow">
					<div class="FilterGroup">
						<p class="FilterHeader">Country:</p>
						<div class="MultiselectContainer" id="CountrySelectContainer">
							<div class="MultiselectTrigger" onclick="ToggleMultiselect('CountryOptions')">
								<span id="MultiselectLabel">All Countries</span>
								<span class="MultiselectArrow">▼</span>
							</div>
							<div class="MultiselectOptions" id="CountryOptions"></div>
						</div>
					</div>
					<div class="FilterGroup">
						<p class="FilterHeader">Launch Site:</p>
						<div class="MultiselectContainer" id="SiteSelectContainer">
							<div class="MultiselectTrigger" onclick="ToggleMultiselect('SiteOptions')">
								<span id="MultiselectLabel">All Sites</span>
								<span class="MultiselectArrow">▼</span>
							</div>
							<div class="MultiselectOptions" id="SiteOptions"></div>
						</div>
					</div>
				</div>
				<hr>
				<button id="SearchSubmit" onclick="Search()">Search</button>
				<hr>

				<div id="SearchScroll">
					<div class="SatCard">
						<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSSXsRTl4fxB9zeceEeEcRLo2yxlLJMSeqww&s" alt="Satellite">
						<div class="SatCardDetails">
							<span class="SatName">Vostok 1</span>
							<div class="CountryDetails">
								<span class="Country">Country: US</span>
								<span class="Site">Site: AFETR</span>
							</div>
							<div class="IdDetails">
								<span class="Norad">NORAD: 99999</span>
								<span class="Site">INTL: 9999-666W</span>
							</div>
						</div>
					</div>
				</div>
				<div id="SearchScrollPage">
					<button id="PrevPage" class="PageBtn" onclick="PageTurn(false)">◄</button>
					<span id="PageNo">1-50 / 100</span>
					<button id="NextPage" class="PageBtn" onclick="PageTurn(true)">►</button>
				</div>
			</div>

			<div id="cesiumContainer"></div>

			<button id="ToggleRightSidebar" class="ToggleBtn" onclick="ToggleSidebar('RightSidebar')">
				<img src="/src/assets/Info.png">
			</button>

			<div class="Sidebar" id="RightSidebar">
				
			</div>
		</div>

	<script type="module" src="/src/main.js"></script>
  	</body>
</html>
